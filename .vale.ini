# Vale prose linter config
# https://vale.sh/docs/topics/config

StylesPath = .vale/styles
MinAlertLevel = suggestion

# Ignore code blocks, tables, and frontmatter.
[formats]
md = md

[*.md]
BasedOnStyles = Vale

# Tone these down — they're noisy in technical docs.
Vale.Spelling = NO

# Skip auto-generated and template content.
[docs/cli-reference.md]
BasedOnStyles =

[docs/tools-registry.md]
BasedOnStyles =

[docs/changelog.md]
BasedOnStyles =

[docs/llms*.txt]
BasedOnStyles =
