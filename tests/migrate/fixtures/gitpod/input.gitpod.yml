image:
  file: .gitpod.Dockerfile

tasks:
  - name: install
    init: |
      npm ci
      pip install -r requirements.txt
    command: |
      npm run dev

ports:
  - port: 3000
    onOpen: open-browser
  - port: 5432
    onOpen: ignore

vscode:
  extensions:
    - dbaeumer.vscode-eslint
    - ms-python.python
