[package]
name = "jarvy-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

[dependencies.jarvy]
path = ".."

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[profile.release]
debug = 1

[[bin]]
name = "fuzz_config_parser"
path = "fuzz_targets/fuzz_config_parser.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_version_parser"
path = "fuzz_targets/fuzz_version_parser.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_toml_input"
path = "fuzz_targets/fuzz_toml_input.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_tool_spec"
path = "fuzz_targets/fuzz_tool_spec.rs"
test = false
doc = false
bench = false
