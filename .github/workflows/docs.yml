name: Deploy Docs

on:
  # Deploy on release tags so the published site always reflects a
  # tagged version. push-to-main with path-filter was removed because
  # docs landing on main between releases now wait until the next
  # release to publish — acceptable since docs are versioned with the
  # binary anyway. workflow_dispatch covers ad-hoc deploys (e.g. for
  # an out-of-band typo fix).
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material + social-card system deps
        # mkdocs-material's social-card plugin (mkdocs.yml has it via the
        # `material` theme bundle) requires cairosvg + Pillow at runtime
        # to rasterize the social images. Without these, `mkdocs build
        # --strict` fails with `ModuleNotFoundError: No module named
        # 'cairosvg'` / 'PIL'. cairosvg also needs the libcairo2 system
        # package which ubuntu-latest already ships.
        run: pip install "mkdocs-material[imaging]" cairosvg Pillow

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
