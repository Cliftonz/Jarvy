name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: false
        default: ''

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}
  CARGO_TERM_COLOR: always

jobs:
  build_and_package:
    name: Build & Package
    runs-on: ${{ matrix.platform }}
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact_paths: target/release/jarvy*_aarch64.dmg
            build_args: ""
            cross: false
          - platform: macos-13
            artifact_paths: target/release/jarvy*_x64.dmg
            build_args: ""
            cross: false
          - platform: ubuntu-latest
            artifact_paths: |
              target/x86_64-unknown-linux-musl/release/jarvy*_amd64.deb
              target/x86_64-unknown-linux-musl/release/jarvy*_x86_64.AppImage
              target/x86_64-unknown-linux-musl/generate-rpm/jarvy*.rpm
            build_args: "--target=x86_64-unknown-linux-musl"
            cross: true
            apt: musl-tools
            sysroot: ""
            pkg_arch: musl
            rust_target: x86_64-unknown-linux-musl
          - platform: windows-latest
            artifact_paths: |
              target/release/jarvy*_x64_en-US.msi
              target/release/jarvy*_x64-setup.exe
            build_args: ""
            cross: false
          - platform: ubuntu-latest
            artifact_paths: |
              target/aarch64-unknown-linux-gnu/release/jarvy*.deb
              target/aarch64-unknown-linux-gnu/generate-rpm/jarvy*.rpm
            build_args: "--target=aarch64-unknown-linux-gnu"
            cross: true
            apt: gcc-aarch64-linux-gnu
            sysroot: /usr/aarch64-linux-gnu/
            pkg_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
          - platform: ubuntu-latest
            artifact_paths: |
              target/armv7-unknown-linux-gnueabihf/release/jarvy*.deb
              target/armv7-unknown-linux-gnueabihf/generate-rpm/jarvy*.rpm
            build_args: "--target=armv7-unknown-linux-gnueabihf"
            cross: true
            apt: gcc-arm-linux-gnueabihf
            sysroot: /usr/arm-linux-gnueabihf/
            pkg_arch: armhf
            rust_target: armv7-unknown-linux-gnueabihf

    steps:
      - uses: actions/checkout@v4

      - name: Install cross dependencies (cross only)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential curl ${{ matrix.apt }}
      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Rust target (cross only)
        if: matrix.cross
        run: rustup target add ${{ matrix.rust_target }}

      - name: Set PKG_CONFIG_SYSROOT_DIR (cross only)
        if: matrix.cross && matrix.sysroot != ''
        run: echo "PKG_CONFIG_SYSROOT_DIR=${{ matrix.sysroot }}" >> $GITHUB_ENV

      - name: Install app dependencies
        run: cargo install cargo-packager cargo-generate-rpm --locked

      - name: Build the application
        run: cargo build --release ${{ matrix.build_args }}

      - name: Package Binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ] && [ "${{ matrix.sysroot }}" != "" ]; then
            cargo packager --target=${{ matrix.rust_target }} --formats=deb --release --verbose
          elif [ "${{ matrix.cross }}" = "true" ] && [ -z "${{ matrix.sysroot }}" ]; then
            cargo packager --target=${{ matrix.rust_target }} --release --verbose
          else
            cargo packager --release --verbose
          fi
      - name: Package RPM
        if: matrix.platform == 'ubuntu-latest'
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo generate-rpm --target=${{ matrix.rust_target }}
          else
            cargo generate-rpm
          fi
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}${{ matrix.cross && format('-{0}', matrix.pkg_arch) || '' }}-release-artifacts
          path: ${{ matrix.artifact_paths }}

  upload_to_release:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    permissions: write-all
    needs: [ build_and_package ]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create attestation for all builds
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/**/jarvy*

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f -name 'jarvy*' | while read -r file; do
            sha256sum "$file" >> SHA256SUMS.txt
          done
          mv SHA256SUMS.txt ../

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          tag_name: ${{ env.VERSION }}
          files: |
            artifacts/**/jarvy*
            SHA256SUMS.txt
          body: |
            ## Installation

            ### Quick Install (Unix)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/bearbinary/jarvy/main/dist/scripts/install.sh | bash
            ```

            ### Quick Install (Windows PowerShell)
            ```powershell
            irm https://raw.githubusercontent.com/bearbinary/jarvy/main/dist/scripts/install.ps1 | iex
            ```

            ### Homebrew
            ```bash
            brew install bearbinary/tap/jarvy
            ```

            ### Cargo
            ```bash
            cargo install jarvy
            ```

            See [installation docs](https://github.com/bearbinary/jarvy#installation) for more options.