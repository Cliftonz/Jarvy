name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below to help us understand and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: |
        When I run `jarvy setup`, the rust installation fails with...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Create jarvy.toml with `rust = "1.75"`
        2. Run `jarvy setup`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: diagnostic
    attributes:
      label: Diagnostic Output
      description: Please run `jarvy doctor` and paste the output
      render: shell
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Alpine)
        - Windows 10
        - Windows 11
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Jarvy Version
      description: Run `jarvy --version` to get this
      placeholder: "jarvy 0.1.0"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: jarvy.toml (if relevant)
      description: Your configuration file
      render: toml

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been reported
          required: true
        - label: I'm using the latest version of Jarvy
          required: false
