# Python API (FastAPI / Django)
# Run: jarvy setup

[privileges]
use_sudo = false

[provisioner]
git = "latest"
pyenv = "latest"
python = { version = "3.12", version_manager = true }
docker = "latest"
jq = "latest"
httpie = "latest"

[pip]
pytest = ">=7.0"
black = "latest"
ruff = "latest"
venv = ".venv"
create_venv = true

[hooks]
post_setup = "python -m pip install -r requirements.txt"

[env.vars]
PYTHONDONTWRITEBYTECODE = "1"
VIRTUAL_ENV = "$PWD/.venv"

[commands]
run = "python -m uvicorn app.main:app --reload"
test = "pytest -v"
