{{- if and .Values.prometheusRule.enabled .Values.serviceMonitor.enabled -}}
{{- $fullname := include "jarvy-telemetry-forwarder.fullname" . -}}
{{- $selector := printf "app_kubernetes_io_name=\"%s\",app_kubernetes_io_instance=\"%s\"" (include "jarvy-telemetry-forwarder.name" .) .Release.Name -}}
{{- $runbook := .Values.prometheusRule.runbookBaseUrl -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ $fullname }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with (include "jarvy-telemetry-forwarder.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  groups:
    # ---------------------------------------------------------------
    # Recording rules. Hoist the repeated 5m-rate calculations once
    # so alerts + dashboards share a single computation. Recording-
    # rule name shape: `jarvy_forwarder:<metric>:<window>` per
    # Prometheus best practice.
    # ---------------------------------------------------------------
    - name: jarvy-telemetry-forwarder.recording
      interval: 30s
      rules:
        - record: jarvy_forwarder:receiver_refused:rate5m
          expr: |
            sum by (instance) (
              rate(otelcol_receiver_refused_log_records{ {{ $selector }} }[5m])
              + rate(otelcol_receiver_refused_metric_points{ {{ $selector }} }[5m])
              + rate(otelcol_receiver_refused_spans{ {{ $selector }} }[5m])
            )
        - record: jarvy_forwarder:exporter_send_failed:rate5m
          expr: |
            sum by (instance, exporter) (
              rate(otelcol_exporter_send_failed_log_records{ {{ $selector }} }[5m])
              + rate(otelcol_exporter_send_failed_metric_points{ {{ $selector }} }[5m])
              + rate(otelcol_exporter_send_failed_spans{ {{ $selector }} }[5m])
            )
        - record: jarvy_forwarder:exporter_queue_utilization:ratio
          expr: |
            otelcol_exporter_queue_size{ {{ $selector }} }
            / clamp_min(otelcol_exporter_queue_capacity{ {{ $selector }} }, 1)
        - record: jarvy_forwarder:transform_allowlist_dropped:rate10m
          expr: |
            sum by (instance) (
              clamp_min(
                rate(otelcol_processor_incoming_items{ {{ $selector }},processor="transform/keep_allowlist_attrs"}[10m])
                - rate(otelcol_processor_outgoing_items{ {{ $selector }},processor="transform/keep_allowlist_attrs"}[10m]),
                0
              )
            )

    - name: jarvy-telemetry-forwarder.alerts
      rules:
        {{- /*
          All alerts use selector labels (app_kubernetes_io_name +
          _instance) rather than namespace=. This makes the rule
          resilient to release-name changes and to operators using
          serviceMonitor.namespaceSelector to scrape from a different
          namespace than the chart installed into.
        */ -}}
        {{- if .Values.prometheusRule.alerts.refusedRecords.enabled }}
        - alert: JarvyForwarderRefusedRecords
          expr: jarvy_forwarder:receiver_refused:rate5m > 0
          for: {{ .Values.prometheusRule.alerts.refusedRecords.for }}
          labels:
            severity: warning
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "Forwarder is refusing telemetry records (logs/metrics/spans)"
            description: "OTLP receiver in pod {{ "{{ $labels.instance }}" }} is refusing records (memory_limiter engaged or rate-limit hit). Investigate with `kubectl logs` and check exporter queue depth."
            runbook_url: "{{ $runbook }}#alert-refused-records"
        {{- end }}
        {{- if .Values.prometheusRule.alerts.exporterFailing.enabled }}
        - alert: JarvyForwarderExporterFailing
          expr: jarvy_forwarder:exporter_send_failed:rate5m > {{ .Values.prometheusRule.alerts.exporterFailing.threshold }}
          for: {{ .Values.prometheusRule.alerts.exporterFailing.for }}
          labels:
            severity: critical
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "Forwarder cannot ship telemetry to backend"
            description: "Exporter {{ "{{ $labels.exporter }}" }} on pod {{ "{{ $labels.instance }}" }} is failing > {{ .Values.prometheusRule.alerts.exporterFailing.threshold }} records/sec. Check backend endpoint health and the Grafana write token validity."
            runbook_url: "{{ $runbook }}#alert-exporter-failing"
        {{- end }}
        {{- if .Values.prometheusRule.alerts.exporterQueueSaturated.enabled }}
        - alert: JarvyForwarderExporterQueueSaturated
          expr: jarvy_forwarder:exporter_queue_utilization:ratio > {{ .Values.prometheusRule.alerts.exporterQueueSaturated.threshold }}
          for: {{ .Values.prometheusRule.alerts.exporterQueueSaturated.for }}
          labels:
            severity: warning
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "Forwarder exporter queue saturating (leading indicator before drops)"
            description: "Exporter {{ "{{ $labels.exporter }}" }} on pod {{ "{{ $labels.instance }}" }} is at >{{ .Values.prometheusRule.alerts.exporterQueueSaturated.threshold }} of queue capacity. The persistent queue is filling because downstream is slow or failing. Act before `JarvyForwarderExporterFailing` fires: check backend health, network egress."
            runbook_url: "{{ $runbook }}#alert-exporter-queue-saturated"
        {{- end }}
        {{- if .Values.prometheusRule.alerts.memoryPressure.enabled }}
        - alert: JarvyForwarderMemoryPressure
          expr: process_resident_memory_bytes{ {{ $selector }} } > {{ .Values.prometheusRule.alerts.memoryPressure.thresholdBytes }}
          for: {{ .Values.prometheusRule.alerts.memoryPressure.for }}
          labels:
            severity: warning
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "Forwarder memory headroom thin — OOMKill risk"
            description: "Pod {{ "{{ $labels.instance }}" }} RSS > {{ .Values.prometheusRule.alerts.memoryPressure.thresholdBytes }} bytes. memory_limiter will engage backpressure soon; verify tail_sampling buffer + batch queue sizing in chart values."
            runbook_url: "{{ $runbook }}#alert-memory-pressure"
        {{- end }}
        {{- if .Values.prometheusRule.alerts.saltStale.enabled }}
        - alert: JarvyForwarderSaltStale
          # Drives age from the ExternalSecrets sync timestamp — the
          # only reliable signal for "salt content was refreshed."
          # Requires external-secrets-operator's metrics endpoint to
          # be scraped by the same Prometheus.
          expr: |
            (time() - external_secrets_sync_calls_total{secret_name="{{ .Values.secrets.piiSaltSecretName }}",secret_namespace="{{ .Release.Namespace }}"})
              > ({{ .Values.prometheusRule.alerts.saltStale.thresholdDays }} * 86400)
          for: 1h
          labels:
            severity: warning
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "PII salt has not been rotated in > {{ .Values.prometheusRule.alerts.saltStale.thresholdDays }} days"
            description: "Salt Secret {{ .Values.secrets.piiSaltSecretName }} in {{ .Release.Namespace }} has not been refreshed by ExternalSecrets for over {{ .Values.prometheusRule.alerts.saltStale.thresholdDays }} days. Rotate in your secret backend; ExternalSecret will refresh the K8s Secret; Reloader rolls the pods (verify Reloader running: see JarvyForwarderReloaderMissing alert)."
            runbook_url: "{{ $runbook }}#alert-salt-stale"
        {{- end }}
        {{- if .Values.prometheusRule.alerts.tailSamplingLow.enabled }}
        - alert: JarvyForwarderTailSamplingRateLow
          expr: |
            (
              rate(otelcol_processor_tail_sampling_count_traces_sampled{ {{ $selector }},policy="probabilistic",sampled="true"}[10m])
              /
              clamp_min(rate(otelcol_processor_tail_sampling_count_traces_sampled{ {{ $selector }},policy="probabilistic"}[10m]), 0.001)
            ) < {{ .Values.prometheusRule.alerts.tailSamplingLow.thresholdPercent }}
            and on() rate(otelcol_processor_tail_sampling_count_traces_sampled{ {{ $selector }},policy="probabilistic"}[10m]) > 0.1
          for: 30m
          labels:
            severity: info
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "Tail-sampling effective rate below configured threshold"
            description: "Probabilistic sampling under {{ .Values.prometheusRule.alerts.tailSamplingLow.thresholdPercent }} effective rate for 30m. Either configured probabilisticSamplingPercentage is too low for current traffic, or the policy LRU is overflowing — check `collector.pipeline.tailSampling` in values."
            runbook_url: "{{ $runbook }}#alert-tail-sampling-low"
        {{- end }}
        {{- if .Values.prometheusRule.alerts.allowlistDroppingKeys.enabled }}
        - alert: JarvyForwarderAllowlistDroppingKeys
          # Drives off the recording rule that compares the transform
          # processor's incoming vs. outgoing item counts. The original
          # `*_modified` metrics did not exist; this is the correct
          # surface for keep_keys-induced attribute drops.
          expr: jarvy_forwarder:transform_allowlist_dropped:rate10m > 0
          for: {{ .Values.prometheusRule.alerts.allowlistDroppingKeys.for }}
          labels:
            severity: warning
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "Forwarder is dropping unknown attribute keys"
            description: "Either an attacker is sending OTLP records with attribute keys outside the allowlist, OR a recent Jarvy CLI release introduced a new resource attribute that needs to be added to pii.passThroughAttributes (if public-safe) or pii.hashedAttributes (if identifying)."
            runbook_url: "{{ $runbook }}#alert-allowlist-dropping-keys"
        {{- end }}
        {{- if .Values.prometheusRule.alerts.podRestarting.enabled }}
        - alert: JarvyForwarderPodRestarting
          expr: |
            increase(kube_pod_container_status_restarts_total{
              namespace="{{ .Release.Namespace }}",
              container="otelcol"}[15m]) > {{ .Values.prometheusRule.alerts.podRestarting.thresholdRestarts }}
          for: {{ .Values.prometheusRule.alerts.podRestarting.for }}
          labels:
            severity: warning
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "Forwarder pod is restarting repeatedly"
            description: "Container `otelcol` in pod {{ "{{ $labels.pod }}" }} has restarted > {{ .Values.prometheusRule.alerts.podRestarting.thresholdRestarts }} times in 15m. Closes the loop when other alerts can't fire (pipeline never starts). Check `kubectl describe pod` and recent logs."
            runbook_url: "{{ $runbook }}#alert-pod-restarting"
        {{- end }}
        {{- if .Values.prometheusRule.alerts.reloaderMissing.enabled }}
        - alert: JarvyForwarderReloaderMissing
          expr: absent(reloader_reloader_reload_executed_total)
          for: {{ .Values.prometheusRule.alerts.reloaderMissing.for }}
          labels:
            severity: warning
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "stakater/reloader is not running — PII salt rotation will silently no-op"
            description: "The chart's salt rotation contract depends on Reloader detecting Secret changes and rolling pods. With Reloader absent, ExternalSecret will refresh the K8s Secret but the Collector keeps reading the old PII_SALT env var until next deploy. Either install Reloader or run `kubectl rollout restart` after every salt rotation."
            runbook_url: "{{ $runbook }}#alert-reloader-missing"
        {{- end }}
        {{- if .Values.prometheusRule.alerts.debugExporterEnabled.enabled }}
        - alert: JarvyForwarderDebugExporterEnabled
          expr: |
            sum by (pod) (kube_pod_annotations{namespace="{{ .Release.Namespace }}",annotation_jarvy_dev_debug_exporter="ON"}) > 0
          for: {{ .Values.prometheusRule.alerts.debugExporterEnabled.for }}
          labels:
            severity: warning
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "Debug exporter is ON in production for > {{ .Values.prometheusRule.alerts.debugExporterEnabled.for }}"
            description: "Pod {{ "{{ $labels.pod }}" }} has collector.debugExporter.enabled=true. Post-anonymize record summaries are being written to stdout (kubectl logs), readable by anyone with pods/log RBAC. Disable in production: `--set collector.debugExporter.enabled=false`."
            runbook_url: "{{ $runbook }}#alert-debug-exporter-enabled"
        {{- end }}
        {{- if and .Values.prometheusRule.alerts.certNotReady.enabled .Values.tls.certManager.enabled }}
        - alert: JarvyForwarderCertNotReady
          expr: certmanager_certificate_ready_status{namespace="{{ .Release.Namespace }}",name="{{ $fullname }}-tls",condition="True"} == 0
          for: {{ .Values.prometheusRule.alerts.certNotReady.for }}
          labels:
            severity: critical
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "TLS Certificate not Ready — clients will fail handshake"
            description: "cert-manager Certificate {{ $fullname }}-tls has been not-Ready for > {{ .Values.prometheusRule.alerts.certNotReady.for }}. Check `kubectl describe certificate -n {{ .Release.Namespace }}` and ClusterIssuer health."
            runbook_url: "{{ $runbook }}#alert-cert-not-ready"
        {{- end }}
        {{- if and .Values.prometheusRule.alerts.certExpiringSoon.enabled .Values.tls.certManager.enabled }}
        - alert: JarvyForwarderCertExpiringSoon
          expr: (certmanager_certificate_expiration_timestamp_seconds{namespace="{{ .Release.Namespace }}",name="{{ $fullname }}-tls"} - time()) < ({{ .Values.prometheusRule.alerts.certExpiringSoon.daysBeforeExpiry }} * 86400)
          for: 1h
          labels:
            severity: warning
            namespace: {{ .Release.Namespace }}
            {{- with .Values.prometheusRule.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "TLS Certificate expiring within {{ .Values.prometheusRule.alerts.certExpiringSoon.daysBeforeExpiry }} days"
            description: "cert-manager has not renewed {{ $fullname }}-tls. Investigate renewal failures — typically ACME rate limit or DNS-01 record drift."
            runbook_url: "{{ $runbook }}#alert-cert-expiring-soon"
        {{- end }}
        {{- with .Values.prometheusRule.extraRules }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
