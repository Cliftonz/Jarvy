{{- if .Values.gatewayApi.enabled }}
{{- /*
  Guard: traefikMiddlewares.enabled=true requires Traefik as the
  GatewayClass. Helm will not warn about referenced ExtensionRef
  Middlewares belonging to a CRD that doesn't exist in the cluster
  (Envoy/Cilium/Istio); the install succeeds and the HTTPRoute
  reconciles into a permanent failed state. Fail loudly at template
  time instead.
*/ -}}
{{- if and .Values.gatewayApi.traefikMiddlewares.enabled (ne .Values.gatewayApi.gateway.gatewayClassName "traefik") }}
{{- fail (printf "gatewayApi.traefikMiddlewares.enabled=true requires gatewayApi.gateway.gatewayClassName=traefik (got %q). For non-Traefik GatewayClasses, set traefikMiddlewares.enabled=false and supply equivalent filters via gatewayApi.httpRoute.extraFilters." .Values.gatewayApi.gateway.gatewayClassName) }}
{{- end }}
{{- /*
  DoS-protection acknowledgement gate (security review F4). When
  traefikMiddlewares.enabled=false (i.e. non-Traefik GatewayClass)
  AND extraFilters is empty AND the operator has not explicitly
  acknowledged the lack of rate-limit / body-cap via
  dosProtection.acceptUnprotected=true, fail install. The public
  OTLP receiver should not be exposed to the internet without
  ingress-side rate limiting.
*/ -}}
{{- $hasExtraFilters := and .Values.gatewayApi.httpRoute.extraFilters (gt (len .Values.gatewayApi.httpRoute.extraFilters) 0) -}}
{{- $accepted := false -}}
{{- with .Values.gatewayApi.dosProtection }}{{- $accepted = .acceptUnprotected | default false -}}{{- end }}
{{- if and (not .Values.gatewayApi.traefikMiddlewares.enabled) (not $hasExtraFilters) (not $accepted) }}
{{- fail "gatewayApi.traefikMiddlewares.enabled=false leaves the OTLP receiver unprotected by ingress-side rate limit + body cap. Supply equivalent filters via gatewayApi.httpRoute.extraFilters (e.g. Envoy Gateway ClientTrafficPolicy + RateLimit), OR set gatewayApi.dosProtection.acceptUnprotected=true to explicitly accept an unprotected receiver (only safe behind a trusted private network)." }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "jarvy-telemetry-forwarder.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
    {{- with .Values.gatewayApi.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $commonAnn := include "jarvy-telemetry-forwarder.annotations" . -}}
  {{- $rtAnn := .Values.gatewayApi.httpRoute.annotations | default dict -}}
  {{- if or $commonAnn (gt (len $rtAnn) 0) }}
  annotations:
    {{- with $commonAnn }}
    {{- . | nindent 4 }}
    {{- end }}
    {{- with $rtAnn }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.gatewayApi.gateway.create }}
    - name: {{ include "jarvy-telemetry-forwarder.fullname" . }}
      namespace: {{ .Release.Namespace }}
      sectionName: https
    {{- else }}
    {{- if not .Values.gatewayApi.httpRoute.parentRefs }}
    {{- fail "gatewayApi.httpRoute.parentRefs must be set when gatewayApi.gateway.create is false" }}
    {{- end }}
    {{- /*
      Cross-namespace parentRef guard: refuse to attach to a Gateway
      in a different namespace than the release unless the operator
      explicitly opts in via `gatewayApi.httpRoute.allowCrossNamespaceParent: true`.
      Cross-namespace attaches require a ReferenceGrant on the
      target side; misconfiguration here is the path to "your
      Gateway is now serving someone else's traffic."
    */ -}}
    {{- $release := .Release.Namespace -}}
    {{- $allowCross := .Values.gatewayApi.httpRoute.allowCrossNamespaceParent | default false -}}
    {{- range .Values.gatewayApi.httpRoute.parentRefs }}
    {{- if and .namespace (ne .namespace $release) (not $allowCross) }}
    {{- fail (printf "gatewayApi.httpRoute.parentRefs[].namespace=%q differs from release namespace %q. Cross-namespace attach is gated; set gatewayApi.httpRoute.allowCrossNamespaceParent: true to confirm you have a ReferenceGrant on the target side." .namespace $release) }}
    {{- end }}
    {{- end }}
    {{- toYaml .Values.gatewayApi.httpRoute.parentRefs | nindent 4 }}
    {{- end }}
  hostnames:
    {{- toYaml .Values.gatewayApi.httpRoute.hostnames | nindent 4 }}
  rules:
    {{- range .Values.gatewayApi.httpRoute.rules }}
    - matches:
        {{- range .matches }}
        - {{- if .path }}
          path:
            type: {{ .path.type }}
            value: {{ .path.value }}
          {{- end }}
          {{- if .method }}
          method: {{ .method }}
          {{- end }}
        {{- end }}
      filters:
        {{- /*
          Order matters: rate-limit BEFORE body-cap. Abusive clients
          get rejected before allocating the body buffer
          (memRequestBodyBytes per request). The 0.1.0 chart had this
          inverted — fixed in 0.2.0 as part of the security/perf
          review enhancement plan.
        */ -}}
        {{- if $.Values.gatewayApi.traefikMiddlewares.enabled }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ include "jarvy-telemetry-forwarder.fullname" $ }}-ratelimit
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ include "jarvy-telemetry-forwarder.fullname" $ }}-bodylimit
        {{- end }}
        {{- /* Caller-supplied filters appended last. */ -}}
        {{- with $.Values.gatewayApi.httpRoute.extraFilters }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      backendRefs:
        - name: {{ include "jarvy-telemetry-forwarder.fullname" $ }}
          port: 4318
    {{- end }}
{{- end }}
