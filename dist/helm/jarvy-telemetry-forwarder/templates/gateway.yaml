{{- if and .Values.gatewayApi.enabled .Values.gatewayApi.gateway.create }}
{{- /* Mutual exclusion: certManager.enabled=true AND
       existingSecretName != "" both supply a cert ref; if both are
       set the chart silently prefers cert-manager and the operator's
       existingSecretName is ignored. Fail loudly. */ -}}
{{- if and .Values.tls.certManager.enabled (ne (toString (.Values.tls.existingSecretName | default "")) "") }}
{{- fail "tls.certManager.enabled=true and tls.existingSecretName are mutually exclusive. Set exactly one." }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "jarvy-telemetry-forwarder.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
    {{- with .Values.gatewayApi.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $commonAnn := include "jarvy-telemetry-forwarder.annotations" . -}}
  {{- $gwAnn := .Values.gatewayApi.gateway.annotations | default dict -}}
  {{- if or $commonAnn (gt (len $gwAnn) 0) }}
  annotations:
    {{- with $commonAnn }}
    {{- . | nindent 4 }}
    {{- end }}
    {{- with $gwAnn }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gatewayApi.gateway.gatewayClassName }}
  listeners:
    {{- range .Values.gatewayApi.gateway.listeners }}
    - name: {{ .name }}
      port: {{ .port }}
      protocol: {{ .protocol }}
      {{- if .tls }}
      tls:
        mode: {{ .tls.mode | default "Terminate" }}
        {{- with .tls.options }}
        options:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if $.Values.tls.certManager.enabled }}
        certificateRefs:
          - kind: Secret
            name: {{ include "jarvy-telemetry-forwarder.fullname" $ }}-tls
        {{- else if $.Values.tls.existingSecretName }}
        certificateRefs:
          - kind: Secret
            name: {{ $.Values.tls.existingSecretName }}
        {{- end }}
      {{- end }}
      {{- with .allowedRoutes }}
      allowedRoutes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
