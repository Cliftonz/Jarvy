{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "jarvy-telemetry-forwarder.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jarvy-telemetry-forwarder.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with (include "jarvy-telemetry-forwarder.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "jarvy-telemetry-forwarder.selectorLabels" . | nindent 6 }}
      # Differentiates the metrics Service from the OTLP Service when
      # split-Service is configured. When using the legacy single
      # Service, this label is also stamped — harmless.
      app.kubernetes.io/component: metrics
  endpoints:
    # path + scheme set explicitly so a future port-change or
    # sidecar that flips port 8888 to HTTPS doesn't silently break
    # scrape. honorLabels MUST stay false — see values.yaml comment.
    - port: self-metrics
      path: /metrics
      scheme: http
      honorLabels: {{ .Values.serviceMonitor.honorLabels }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | default "10s" }}
      {{- with .Values.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
