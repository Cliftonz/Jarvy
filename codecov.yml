# Codecov Configuration
# https://docs.codecov.com/docs/codecovyml-reference

codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "50...100"
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        # Start with informational only, enable enforcement later
        informational: true
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: true

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes

ignore:
  - "tests/**/*"
  - "benches/**/*"
  - "fuzz/**/*"
  - "crates/cargo-jarvy/**/*"
  - "build.rs"

flags:
  unittests:
    paths:
      - src/
    carryforward: true
  integration:
    paths:
      - tests/
    carryforward: true
